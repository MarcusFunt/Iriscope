[pi]
host = "raspberrypi.local"
user = "pi"
port = 22
remote_root = "/home/pi/iriscope"
# ssh_key = "C:/Users/you/.ssh/id_ed25519"

[capture]
count = 12
shutter_us = 0
gain = 0
awb = "auto"
awb_gains = [3.2, 1.4]
denoise = "cdn_fast"
quality = 95
metering = "centre"
exposure = "normal"
ev = 0
brightness = 0
contrast = 1
saturation = 1
sharpness = 1
# tuning_file = "/usr/share/libcamera/ipa/rpi/vc4/imx477_scientific.json"
hdr = "off"
nopreview = true

[preview]
width = 640
height = 480
framerate = 12
quality = 70
stream_timeout_s = 0

[processing]
stack_method = "sigma"
sigma = 2.5
min_frames = 3
save_intermediates = true
